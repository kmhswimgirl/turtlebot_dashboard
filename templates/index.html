<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turtlebot Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="ros-logo-title">
  <span class="ros-logo">
    <span class="ros-dot"></span><span class="ros-dot"></span><span class="ros-dot"></span>
    <span class="ros-dot"></span><span class="ros-dot"></span><span class="ros-dot"></span>
    <span class="ros-dot"></span><span class="ros-dot"></span><span class="ros-dot"></span>
  </span>
  <h1>RBE 3002: Turtlebot Dashboard</h1>
</div>
<div class="terminal-frame">
  <div class="terminal-bar">
    <span class="terminal-dot red"></span>
    <span class="terminal-dot yellow"></span>
    <span class="terminal-dot green"></span>
  </div>
  <table id="deviceTable">
    <thead>
      <tr>
        <th>Number</th>
        <th>Name</th>
        <th>IP</th>
        <th>DNS Status</th>
        <th>Last Connected</th>
      </tr>
    </thead>
    <tbody>
      <!-- generated table rows go here -->
    </tbody>
  </table>
</div>

<footer class="footer">
  <span>&copy; 2026 RBE 3002 Turtlebot Dashboard &mdash; Developed by Kylie Herbstzuber</span>
</footer>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='js/actions.js') }}"></script>
</body>
</html>
